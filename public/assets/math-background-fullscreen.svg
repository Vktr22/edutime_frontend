<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="mathRadial-fullscreen">
      <stop offset="0%" style="stop-color:#c50337;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0a0506;stop-opacity:0.95" />
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#mathRadial-fullscreen)" />

  <!-- Matematikai szimbólumok és formulák -->
  <text x="8%" y="20%" fill="#c50337" opacity="0.5" font-size="32" font-family="serif">∫</text>
  <text x="15%" y="45%" fill="#d63d5e" opacity="0.4" font-size="24" font-family="serif">dx</text>
  <text x="25%" y="65%" fill="#b4204a" opacity="0.35" font-size="20" font-family="serif">f(x)=</text>
  <text x="35%" y="30%" fill="#c50337" opacity="0.45" font-size="28" font-family="serif">π</text>
  <text x="42%" y="75%" fill="#d63d5e" opacity="0.38" font-size="22" font-family="serif">∑</text>
  <text x="50%" y="18%" fill="#c50337" opacity="0.42" font-size="26" font-family="serif">√</text>
  <text x="58%" y="55%" fill="#9b1b30" opacity="0.4" font-size="24" font-family="serif">x²+y²</text>
  <text x="65%" y="35%" fill="#c50337" opacity="0.48" font-size="30" font-family="serif">∞</text>
  <text x="72%" y="70%" fill="#d63d5e" opacity="0.36" font-size="20" font-family="serif">lim</text>
  <text x="80%" y="25%" fill="#b4204a" opacity="0.44" font-size="25" font-family="serif">θ</text>
  <text x="88%" y="50%" fill="#c50337" opacity="0.4" font-size="22" font-family="serif">α</text>
  <text x="92%" y="80%" fill="#9b1b30" opacity="0.38" font-size="19" font-family="serif">Δ</text>

  <text x="5%" y="85%" fill="#c50337" opacity="0.35" font-size="21" font-family="serif">sin(x)</text>
  <text x="18%" y="92%" fill="#d63d5e" opacity="0.33" font-size="18" font-family="serif">cos</text>
  <text x="45%" y="95%" fill="#b4204a" opacity="0.37" font-size="20" font-family="serif">d/dx</text>
  <text x="70%" y="88%" fill="#c50337" opacity="0.39" font-size="23" font-family="serif">∂</text>

  <!-- Geometriai alakzatok -->
  <circle cx="12%" cy="60%" r="12" fill="none" stroke="#c50337" stroke-width="1.5" opacity="0.35" />
  <circle cx="48%" cy="48%" r="15" fill="none" stroke="#d63d5e" stroke-width="1.2" opacity="0.3" />
  <circle cx="85%" cy="65%" r="10" fill="none" stroke="#b4204a" stroke-width="1" opacity="0.32" />

  <polygon points="280,35 300,75 260,75" fill="none" stroke="#c50337" stroke-width="1.5" opacity="0.28" />
  <polygon points="550,120 575,160 525,160" fill="none" stroke="#9b1b30" stroke-width="1.3" opacity="0.26" />

  <rect x="20%" y="10%" width="25" height="25" fill="none" stroke="#d63d5e" stroke-width="1.2" opacity="0.3" transform="rotate(15 22 12)" />
  <rect x="75%" y="15%" width="22" height="22" fill="none" stroke="#c50337" stroke-width="1" opacity="0.33" transform="rotate(-20 77 17)" />

  <!-- Egyenesek és vonalak -->
  <line x1="10%" y1="30%" x2="30%" y2="35%" stroke="#c50337" stroke-width="1" opacity="0.25" />
  <line x1="55%" y1="65%" x2="75%" y2="60%" stroke="#d63d5e" stroke-width="1" opacity="0.23" />
  <line x1="35%" y1="85%" x2="55%" y2="90%" stroke="#b4204a" stroke-width="0.8" opacity="0.27" />
</svg>
